<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聰明兔冷暖計算機</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #332922;
      --muted: #8d8177;
      --paper: #fffdf9;
      --bg: #faf8f5;
      --line: #eadfd5;
      --accent: #9b7854;
      --safe: #3f9b6d;
      --mild: #d99b2b;
      --severe: #dc6b2f;
      --critical: #c73535;
      --cold: #6a7fc0;
      --freezing: #7666c5;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    main {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 24px 16px 44px;
    }

    header { text-align: center; margin-bottom: 18px; }
    h1 { font-size: 24px; margin: 8px 0 6px; letter-spacing: 0; }
    p { margin: 0; line-height: 1.7; }
    .lead { color: var(--muted); font-size: 14px; }
    .card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 2px 14px rgba(80, 60, 40, .06);
    }
    .note {
      background: var(--paper);
      border-left: 4px solid #c4a882;
      color: #6d5d4f;
      font-size: 13px;
    }
    .step {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: block; color: #756a60; font-size: 13px; margin-bottom: 6px; }
    input[type="number"] {
      width: 100%;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      background: #fffdfa;
      color: var(--ink);
      font-size: 20px;
      font-weight: 700;
      outline: none;
    }
    input[type="number"]:focus {
      border-color: #c4a882;
      box-shadow: 0 0 0 3px rgba(196, 168, 130, .18);
    }
    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: #5d5148;
      font-size: 13px;
      line-height: 1.6;
    }
    .check-row input { width: 18px; height: 18px; margin-top: 2px; }
    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 13px 14px;
      background: #342a23;
      color: white;
      cursor: pointer;
      font-size: 15px;
