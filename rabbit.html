<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聰明兔冷暖計算機</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #faf8f5; font-family: 'Noto Sans TC', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    input:focus { border-color: #c4a882 !important; box-shadow: 0 0 0 3px rgba(196,168,130,0.15); }
    button:active { transform: scale(0.98); }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState } = React;

    function calcTHI(t, rh) {
      return t - (0.31 - 0.31 * (rh / 100)) * (t - 14.4);
    }

    function assessHour(t, rh) {
      const thi = calcTHI(t, rh);
      if (t < 10) return { type: "freezing", thi };
      if (t < 15) return { type: "cold", thi };
      if (thi >= 30 || t >= 30) return { type: "critical", thi };
      if (thi >= 28.9) return { type: "severe", thi };
      if (thi >= 27.8 || t >= 28) return { type: "mild", thi };
      return { type: "safe", thi };
    }

    function upgradeType(type) {
      const map = { safe: "mild", mild: "severe", severe: "critical", critical: "critical", cold: "cold", freezing: "freezing" };
      return map[type] || type;
    }

    const LEVEL = {
      freezing: { label: "過冷，需要暖氣 🥶", sublabel: "溫度過低，兔兔有失溫風險", color: "#7c6fcd", bg: "#f5f3ff", border: "#c4bef7", hvac: "heat" },
      cold:     { label: "偏涼，注意保暖 🧊", sublabel: "低溫可能讓兔兔不舒服", color: "#8b9fd4", bg: "#f0f4ff", border: "#c8d4f0", hvac: "heat" },
      safe:     { label: "無熱緊迫 ✅", sublabel: "兔兔處於舒適範圍", color: "#4caf7d", bg: "#f0faf4", border: "#b2dfca", hvac: "none" },
      mild:     { label: "輕微熱緊迫 🟡", sublabel: "兔兔開始感到不舒服", color: "#e8a838", bg: "#fffbf0", border: "#fde68a", hvac: "cool" },
      severe:   { label: "嚴重熱緊迫 🟠", sublabel: "健康受到威脅，請盡快處理", color: "#e07030", bg: "#fff8f0", border: "#ffd0a0", hvac: "cool" },
      critical: { label: "非常嚴重熱緊迫 🔴", sublabel: "有生命危險，立即採取行動", color: "#d63030", bg: "#fff3f0", border: "#ffb8b0", hvac: "cool" },
    };

    const TYPE_COLOR = {
      freezing: "#7c6fcd", cold: "#a0aed4", safe: "#4caf7d",
      mild: "#e8a838", severe: "#e07030", critical: "#d63030",
    };

    function acCoolTemp(thi, t) {
      if (t >= 30 || thi >= 30) return 26;
      if (t >= 28 || thi >= 28.9) return 25;
      return 24;
    }
    function acHeatTemp(t) { return t < 10 ? 22 : 20; }

    function fmt(h) { return `${String(h).padStart(2, "0")}:00`; }

    // 產生具體的開關冷暖氣建議
    function generateSchedule(indoorType, hourlyData) {
      if (!hourlyData || hourlyData.length === 0) return null;

      const schedule = [];

      // 掃描未來24小時，找需要冷氣或暖氣的連續時段
      let coolStart = null, heatStart = null;

      for (let i = 0; i < hourlyData.length; i++) {
        const h = hourlyData[i];
        const needsCool = ["mild","severe","critical"].includes(h.type);
        const needsHeat = ["cold","freezing"].includes(h.type);

        // 冷氣時段
        if (needsCool && coolStart === null) coolStart = i;
        if (!needsCool && coolStart !== null) {
          // 建議提前1小時開
          const openIdx = Math.max(0, coolStart - 1);
          const openH = hourlyData[openIdx];
          const closeH = hourlyData[i];
          const acTemp = ["critical","severe"].includes(hourlyData[coolStart].type) ? 25 : 24;
          schedule.push({
            kind: "cool", acTemp,
            openLabel: `${openH.day === "明天" ? "明天 " : ""}${fmt(openH.hour)}`,
            closeLabel: `${closeH.day === "明天" ? "明天 " : ""}${fmt(closeH.hour)}`,
            openIdx, closeIdx: i,
          });
          coolStart = null;
        }

        // 暖氣時段
        if (needsHeat && heatStart === null) heatStart = i;
        if (!needsHeat && heatStart !== null) {
          const openH = hourlyData[heatStart];
          const closeH = hourlyData[i];
          schedule.push({
            kind: "heat", acTemp: 20,
            openLabel: `${openH.day === "明天" ? "明天 " : ""}${fmt(openH.hour)}`,
            closeLabel: `${closeH.day === "明天" ? "明天 " : ""}${fmt(closeH.hour)}`,
          });
          heatStart = null;
        }
      }

      // 處理到結尾還沒關的時段
      if (coolStart !== null) {
        const openIdx = Math.max(0, coolStart - 1);
        const openH = hourlyData[openIdx];
        const acTemp = ["critical","severe"].includes(hourlyData[coolStart].type) ? 25 : 24;
        schedule.push({ kind: "cool", acTemp, openLabel: `${openH.day === "明天" ? "明天 " : ""}${fmt(openH.hour)}`, closeLabel: "預報結束前", openIdx });
      }
      if (heatStart !== null) {
        const openH = hourlyData[heatStart];
        schedule.push({ kind: "heat", acTemp: 20, openLabel: `${openH.day === "明天" ? "明天 " : ""}${fmt(openH.hour)}`, closeLabel: "預報結束前" });
      }

      return schedule;
    }

    function THIBar({ thi, type }) {
      const color = TYPE_COLOR[type];
      const pct = Math.min(100, Math.max(0, ((thi - 24) / 8) * 100));
      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
            <span style={{ fontSize: 12, color: "#999" }}>THI 溫濕度指數</span>
            <span style={{ fontSize: 26, fontWeight: 700, color, fontFamily: "'DM Mono', monospace" }}>{thi.toFixed(1)}</span>
          </div>
          <div style={{ position: "relative", height: 10, borderRadius: 99,
            background: "linear-gradient(to right, #4caf7d 0%, #4caf7d 45%, #e8a838 58%, #e07030 72%, #d63030 100%)" }}>
            <div style={{ position: "absolute", top: -3, left: `calc(${pct}% - 8px)`,
              width: 16, height: 16, borderRadius: 99, background: color,
              border: "2.5px solid white", boxShadow: "0 1px 6px rgba(0,0,0,0.2)", transition: "left 0.6s ease" }} />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 10, color: "#bbb" }}>
            <span>24</span><span style={{ color: "#4caf7d" }}>安全 &lt;27.8</span>
            <span style={{ color: "#e8a838" }}>輕微</span><span style={{ color: "#e07030" }}>嚴重</span>
            <span style={{ color: "#d63030" }}>&gt;30</span><span>32</span>
          </div>
        </div>
      );
    }

    function MiniGauge({ value, min, max, label, unit, color }) {
      const pct = Math.min(100, Math.max(0, ((value - min) / (max - min)) * 100));
      return (
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
            <span style={{ fontSize: 11, color: "#aaa" }}>{label}</span>
            <span style={{ fontSize: 16, fontWeight: 700, color, fontFamily: "'DM Mono', monospace" }}>{value}{unit}</span>
          </div>
          <div style={{ height: 5, borderRadius: 99, background: "#ece8e1", overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, borderRadius: 99, background: color, transition: "width 0.7s ease" }} />
          </div>
        </div>
      );
    }

    function HourlyStrip({ hourlyData }) {
      // 顯示時間標籤：0, 6, 12, 18, 23 對應到 next24 的 index
      const labelIndices = [0, 6, 12, 18, 23];
      return (
        <div>
          <div style={{ fontSize: 12, color: "#999", marginBottom: 8 }}>未來 24 小時預測</div>
          <div style={{ display: "flex", gap: 2, height: 28, borderRadius: 8, overflow: "hidden" }}>
            {hourlyData.map((h, i) => (
              <div key={i} title={`${h.day} ${fmt(h.hour)} ${h.t}°C ${h.rh}% THI:${h.thi.toFixed(1)}`}
                style={{ flex: 1, background: TYPE_COLOR[h.type], position: "relative" }}>
                {i === 0 && (
                  <div style={{ position: "absolute", bottom: -16, left: "50%", transform: "translateX(-50%)",
                    fontSize: 9, color: "#3a2e28", whiteSpace: "nowrap", fontWeight: 700 }}>現在</div>
                )}
              </div>
            ))}
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20, fontSize: 10, color: "#ccc" }}>
            {labelIndices.map(i => {
              const h = hourlyData[i];
              if (!h) return null;
              return <span key={i}>{h.day === "明天" ? "明" : ""}{fmt(h.hour)}</span>;
            })}
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 8, flexWrap: "wrap" }}>
            {[["safe","安全"],["mild","輕微熱"],["severe","嚴重熱"],["critical","危險"],["cold","偏涼"],["freezing","過冷"]].map(([type, label]) => (
              <div key={type} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: "#aaa" }}>
                <div style={{ width: 10, height: 10, borderRadius: 2, background: TYPE_COLOR[type] }} />{label}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ScheduleCard({ schedule }) {
      if (!schedule || schedule.length === 0) return (
        <div style={{ marginTop: 12, padding: "12px 14px", borderRadius: 10,
          background: "#f0faf4", border: "1px solid #b2dfca", fontSize: 13, color: "#4caf7d", textAlign: "center" }}>
          ✅ 未來 24 小時室外預測均在舒適範圍，不需要開冷暖氣。
        </div>
      );
      return (
        <div style={{ marginTop: 12 }}>
          {schedule.map((s, i) => {
            const isCool = s.kind === "cool";
            const color = isCool ? "#e07030" : "#7c6fcd";
            const bg = isCool ? "#fff8f0" : "#f5f3ff";
            const border = isCool ? "#ffd0a0" : "#c4bef7";
            return (
              <div key={i} style={{ padding: "14px 16px", borderRadius: 12, background: bg, border: `1px solid ${border}`, marginBottom: 10 }}>
                <div style={{ fontSize: 12, color, fontWeight: 700, marginBottom: 10 }}>
                  {isCool ? "❄️ 建議開冷氣" : "🔆 建議開暖氣"}（設定 {s.acTemp}°C）
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <div style={{ flex: 1, textAlign: "center", padding: "10px 8px", background: "white", borderRadius: 8 }}>
                    <div style={{ fontSize: 10, color: "#aaa", marginBottom: 4 }}>開機時間</div>
                    <div style={{ fontSize: 18, fontWeight: 700, color, fontFamily: "'DM Mono', monospace" }}>{s.openLabel}</div>
                  </div>
                  <div style={{ fontSize: 16, color: "#ccc" }}>→</div>
                  <div style={{ flex: 1, textAlign: "center", padding: "10px 8px", background: "white", borderRadius: 8 }}>
                    <div style={{ fontSize: 10, color: "#aaa", marginBottom: 4 }}>可關機時間</div>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#888", fontFamily: "'DM Mono', monospace" }}>{s.closeLabel}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function InfoModal({ onClose }) {
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 100,
          display: "flex", alignItems: "flex-end", justifyContent: "center" }}
          onClick={onClose}>
          <div style={{ background: "white", borderRadius: "20px 20px 0 0", padding: "28px 24px 48px",
            width: "100%", maxWidth: 480, maxHeight: "80vh", overflowY: "auto", animation: "slideUp 0.3s ease" }}
            onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#3a2e28" }}>關於本工具</div>
              <button onClick={onClose} style={{ background: "#f0ece6", border: "none", borderRadius: 99,
                width: 32, height: 32, fontSize: 16, cursor: "pointer", color: "#888" }}>✕</button>
            </div>
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#c4a882", letterSpacing: 1, marginBottom: 10 }}>🔒 隱私權聲明</div>
              <div style={{ fontSize: 13, color: "#666", lineHeight: 2 }}>
                本工具不收集任何個人資料。<br/>
                定位資訊僅用於向 Open-Meteo 查詢當地即時天氣，不經過任何第三方伺服器，查詢後不儲存、不上傳、不分享。<br/>
                您輸入的溫度與濕度數值，僅在您的裝置本地進行計算，不會傳送至任何地方。<br/>
                本工具無帳號系統、無 Cookie、無使用追蹤。
              </div>
            </div>
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#c4a882", letterSpacing: 1, marginBottom: 10 }}>⚠️ 免責聲明</div>
              <div style={{ fontSize: 13, color: "#666", lineHeight: 2 }}>
                本工具 THI 分級標準來自畜牧業農場肉兔之生產效能研究，並非針對室內寵物兔設計。室內寵物兔（尤其侏儒兔等小型品種）耳短散熱較弱，耐熱能力可能低於研究數值。<br/><br/>
                學術界亦持續修正此標準——Oladimeji et al.（2022）提出更嚴格的閾值，顯示原始標準對寵物兔可能過於寬鬆。本工具已加入溫度 ≥ 28°C 強制警告作為補充保護。<br/><br/>
                本工具僅供參考，不構成獸醫診療建議。若兔兔出現喘氣、流口水、無力、耳朵異常發熱、不進食等症狀，請立即聯繫特殊寵物獸醫。
              </div>
            </div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#c4a882", letterSpacing: 1, marginBottom: 10 }}>📚 學術參考資料</div>
              <div style={{ fontSize: 12, color: "#888", lineHeight: 2.2 }}>
                <div style={{ marginBottom: 8, paddingBottom: 8, borderBottom: "1px solid #f0ece6" }}>
                  Marai, I.F.M., Habeeb, A.A.M. &amp; Gad, A.E. (2002). Rabbits' productive, reproductive and physiological performance traits as affected by heat stress: A review. <em>Livestock Production Science</em>, 78: 71–90.
                </div>
                <div style={{ marginBottom: 8, paddingBottom: 8, borderBottom: "1px solid #f0ece6" }}>
                  Marai, I.F.M., Habeeb, A.A.M. &amp; Gad, A.E. (2004). Growth performance traits and the physiological background of young doe rabbits as affected by climatic conditions and lighting regime. <em>8th World Rabbit Congress</em>, Puebla, Mexico, pp. 288–297.
                </div>
                <div style={{ marginBottom: 8, paddingBottom: 8, borderBottom: "1px solid #f0ece6" }}>
                  蔡銘洋、柯瑋羚、謝昭賢、吳錫勳（2013）。環境溫濕度指數對母兔哺育性能與仔兔生長性能之影響。<em>畜產研究</em>，46(3)：179–186。
                </div>
                <div>Oladimeji et al. (2022). Updated THI-based heat stress categories for rabbits.</div>
              </div>
            </div>
            <div style={{ marginTop: 20, fontSize: 11, color: "#ccc", textAlign: "center" }}>
              天氣資料來源：Open-Meteo（免費開放氣象 API）
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [indoorTemp, setIndoorTemp] = useState("");
      const [indoorHumid, setIndoorHumid] = useState("");
      const [vulnerable, setVulnerable] = useState(false);
      const [outdoor, setOutdoor] = useState(null);
      const [hourlyData, setHourlyData] = useState(null);
      const [currentHour, setCurrentHour] = useState(0);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [result, setResult] = useState(null);
      const [locName, setLocName] = useState("");
      const [showModal, setShowModal] = useState(false);

      async function fetchWeather(lat, lon) {
        try {
          const res = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
            `&current=temperature_2m,relative_humidity_2m` +
            `&hourly=temperature_2m,relative_humidity_2m&forecast_days=2&timezone=auto`
          );
          const data = await res.json();
          setOutdoor({ temp: Math.round(data.current.temperature_2m * 10) / 10, humidity: data.current.relative_humidity_2m });
          const now = new Date(data.current.time);
          const currentHour = now.getHours();
          setCurrentHour(currentHour);
          // 取從現在起算的 24 小時（跨日也沒問題）
          const allHours = data.hourly.temperature_2m.map((t, i) => {
            const rh = data.hourly.relative_humidity_2m[i];
            const { type, thi } = assessHour(t, rh);
            const hour = i % 24;
            const day = i < 24 ? "今天" : "明天";
            return { t: Math.round(t * 10) / 10, rh, type, thi, hour, day, index: i };
          });
          const next24 = allHours.slice(currentHour, currentHour + 24);
          setHourlyData(next24);
        } catch { setError("無法取得天氣資料，請稍後再試。"); }
        setLoading(false);
      }

      function handleLocate() {
        if (!navigator.geolocation) { setError("此瀏覽器不支援定位功能。"); return; }
        setLoading(true); setError("");
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            const { latitude, longitude } = pos.coords;
            try {
              const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
              const data = await res.json();
              setLocName(data.address?.city || data.address?.town || data.address?.county || "");
            } catch { setLocName(""); }
            fetchWeather(latitude, longitude);
          },
          () => { setError("定位被拒絕，請允許瀏覽器存取位置。"); setLoading(false); }
        );
      }

      function handleCheck() {
        const t = parseFloat(indoorTemp);
        const h = parseFloat(indoorHumid);
        if (isNaN(t) || isNaN(h)) { setError("請輸入室內溫度和濕度。"); return; }
        setError("");
        const { type: rawType, thi } = assessHour(t, h);
        const type = vulnerable ? upgradeType(rawType) : rawType;
        const level = LEVEL[type];
        const acTarget = acCoolTemp(thi, t);
        const heatTarget = acHeatTemp(t);
        let suggestion = "", coolTemp = null, heatTemp = null;

        if (level.hvac === "cool") {
          coolTemp = acTarget;
          const extra = vulnerable ? "（幼兔／老兔／病兔請提早處理）" : "";
          if (type === "critical") suggestion = `室內溫度或 THI 已達危險等級${extra}，請立即開冷氣設定 ${acTarget}°C，確保有充足飲水，注意是否有中暑跡象。`;
          else if (type === "severe") suggestion = `嚴重熱緊迫${extra}，請盡快開冷氣設定 ${acTarget}°C。`;
          else {
            if (outdoor && outdoor.temp < t - 2 && outdoor.humidity < 65)
              suggestion = `輕微熱緊迫${extra}，室外較涼，可先開窗觀察；若仍悶熱，建議冷氣設定 ${acTarget}°C。`;
            else suggestion = `輕微熱緊迫${extra}，建議開冷氣設定 ${acTarget}°C。`;
          }
        } else if (level.hvac === "heat") {
          heatTemp = heatTarget;
          const extra = vulnerable ? "（幼兔／老兔／病兔尤其需要注意）" : "";
          suggestion = type === "freezing"
            ? `室內過冷${extra}，請開暖氣設定 ${heatTarget}°C，確保兔兔遠離冷風直吹。`
            : `室內偏涼${extra}，建議開暖氣設定 ${heatTarget}°C。`;
        } else {
          if (outdoor && outdoor.temp > t + 3) suggestion = "室內目前舒適，但室外較熱，建議關窗保持涼爽。";
          else if (outdoor && outdoor.temp < t - 2 && outdoor.humidity < 65) suggestion = "室外比室內涼，可開窗自然通風，不必開冷氣。";
          else suggestion = "室內溫濕度在安全範圍，維持現狀就好。";
        }

        const schedule = generateSchedule(type, hourlyData);
        setResult({ type, rawType, level, thi, t, h, suggestion, coolTemp, heatTemp, schedule, vulnerable });
      }

      const card = { background: "white", borderRadius: 16, padding: "20px 22px", boxShadow: "0 2px 12px rgba(0,0,0,0.06)", border: "1px solid #f0ece6" };

      return (
        <div style={{ minHeight: "100vh", background: "#faf8f5", fontFamily: "'Noto Sans TC', sans-serif", padding: "24px 16px 48px", maxWidth: 480, margin: "0 auto" }}>

          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <div style={{ fontSize: 48, lineHeight: 1 }}>🐇</div>
            <h1 style={{ fontSize: 21, fontWeight: 700, color: "#3a2e28", margin: "8px 0 4px", letterSpacing: 1 }}>聰明兔冷暖計算機</h1>
            <p style={{ fontSize: 13, color: "#a89b8c", margin: 0 }}>開得剛好，不多不少</p>
          </div>

          <div style={{ ...card, marginBottom: 14, borderLeft: "3px solid #c4a882", background: "#fffdf9" }}>
            <div style={{ fontSize: 13, color: "#7a6a5a", lineHeight: 1.9 }}>
              🐾 <strong>每隻兔兔都不一樣</strong><br/>
              數字只是參考，請隨時觀察你的兔兔狀態——比平時更安靜、食慾變差、趴著不動，都是需要留意的訊號。
            </div>
            <div style={{ marginTop: 14, paddingTop: 12, borderTop: "1px solid #f0ece6" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }} onClick={() => setVulnerable(!vulnerable)}>
                <div style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${vulnerable ? "#c4a882" : "#ddd"}`,
                  background: vulnerable ? "#c4a882" : "white", display: "flex", alignItems: "center", justifyContent: "center",
                  transition: "all 0.2s", flexShrink: 0 }}>
                  {vulnerable && <span style={{ color: "white", fontSize: 14, fontWeight: 700 }}>✓</span>}
                </div>
                <div>
                  <div style={{ fontSize: 13, color: "#5a4a3a", fontWeight: 600 }}>我的兔兔是幼兔／老兔／病兔</div>
                  <div style={{ fontSize: 11, color: "#aaa", marginTop: 2 }}>勾選後將提高一個警戒等級，給予更保守的建議</div>
                </div>
              </div>
            </div>
          </div>

          <div style={{ ...card, marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#c4a882", letterSpacing: 2, marginBottom: 14 }}>STEP 1 ／ 室內環境</div>
            <div style={{ display: "flex", gap: 12 }}>
              {[
                { label: "溫度 (°C)", val: indoorTemp, set: setIndoorTemp, ph: "如 28" },
                { label: "濕度 (%)", val: indoorHumid, set: setIndoorHumid, ph: "如 72" },
              ].map(({ label, val, set, ph }) => (
                <div key={label} style={{ flex: 1 }}>
                  <label style={{ fontSize: 12, color: "#888", display: "block", marginBottom: 6 }}>{label}</label>
                  <input type="number" value={val} onChange={e => set(e.target.value)} placeholder={ph}
                    style={{ width: "100%", padding: "10px 12px", borderRadius: 10,
                      border: "1.5px solid #ede8e1", fontSize: 20, fontFamily: "'DM Mono', monospace",
                      fontWeight: 600, color: "#3a2e28", background: "#fdfcfb", outline: "none" }} />
                </div>
              ))}
            </div>
          </div>

          <div style={{ ...card, marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#c4a882", letterSpacing: 2, marginBottom: 14 }}>STEP 2 ／ 室外天氣 + 今日預報（選填）</div>
            <button onClick={handleLocate} disabled={loading} style={{
              width: "100%", padding: "12px", borderRadius: 10,
              background: loading ? "#f0ece6" : "#3a2e28", color: loading ? "#aaa" : "white",
              border: "none", fontSize: 14, fontWeight: 600, cursor: loading ? "not-allowed" : "pointer",
            }}>
              {loading ? "定位中…" : "📍 自動抓取我的位置"}
            </button>
            {outdoor && (
              <div>
                <div style={{ marginTop: 14, display: "flex", gap: 16 }}>
                  <MiniGauge value={outdoor.temp} min={0} max={40} label={locName ? `氣溫（${locName}）` : "室外氣溫"} unit="°C" color="#e8a838" />
                  <MiniGauge value={outdoor.humidity} min={0} max={100} label="濕度" unit="%" color="#5b8fcc" />
                </div>
                <div style={{ marginTop: 10, padding: "8px 12px", background: "#faf8f5", borderRadius: 8, fontSize: 12, color: "#888" }}>
                  室外 THI：
                  <span style={{ fontFamily: "'DM Mono', monospace", fontWeight: 700, color: TYPE_COLOR[assessHour(outdoor.temp, outdoor.humidity).type] }}>
                    {calcTHI(outdoor.temp, outdoor.humidity).toFixed(1)}
                  </span>
                  <span style={{ marginLeft: 6 }}>{LEVEL[assessHour(outdoor.temp, outdoor.humidity).type].label}</span>
                </div>
              </div>
            )}
            {hourlyData && <div style={{ marginTop: 16 }}><HourlyStrip hourlyData={hourlyData} /></div>}
          </div>

          {error && <div style={{ color: "#e05c3a", fontSize: 13, padding: "8px 12px", background: "#fff5f2", borderRadius: 8, marginBottom: 12 }}>⚠️ {error}</div>}

          <button onClick={handleCheck} style={{
            width: "100%", padding: "14px", borderRadius: 12,
            background: "linear-gradient(135deg, #c4a882, #8a6a4a)",
            color: "white", border: "none", fontSize: 15, fontWeight: 700,
            cursor: "pointer", letterSpacing: 1, marginBottom: 20,
            boxShadow: "0 4px 16px rgba(138,106,74,0.3)",
          }}>
            🐇 計算兔兔 THI
          </button>

          {result && (
            <div style={{ ...card, borderColor: result.level.border, background: result.level.bg, animation: "fadeIn 0.4s ease" }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: result.level.color, marginBottom: 2 }}>{result.level.label}</div>
              <div style={{ fontSize: 13, color: "#999", marginBottom: result.vulnerable ? 6 : 18 }}>{result.level.sublabel}</div>
              {result.vulnerable && result.type !== result.rawType && (
                <div style={{ fontSize: 11, color: "#c4a882", marginBottom: 14, padding: "6px 10px", background: "rgba(196,168,130,0.1)", borderRadius: 6 }}>
                  ⬆️ 已依幼兔／老兔／病兔提高一個警戒等級
                </div>
              )}
              <div style={{ marginBottom: 18 }}><THIBar thi={result.thi} type={result.type} /></div>
              <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, color: "#bbb", fontWeight: 600, letterSpacing: 1, marginBottom: 8 }}>室內</div>
                  <MiniGauge value={result.t} min={0} max={40} label="溫度" unit="°C" color="#e8a838" />
                  <div style={{ marginTop: 8 }} />
                  <MiniGauge value={result.h} min={0} max={100} label="濕度" unit="%" color="#5b8fcc" />
                </div>
                {outdoor && (
                  <div style={{ display: "flex", gap: 12, flex: 1 }}>
                    <div style={{ width: 1, background: "#ede8e1" }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 11, color: "#bbb", fontWeight: 600, letterSpacing: 1, marginBottom: 8 }}>室外</div>
                      <MiniGauge value={outdoor.temp} min={0} max={40} label="溫度" unit="°C" color="#e8a838" />
                      <div style={{ marginTop: 8 }} />
                      <MiniGauge value={outdoor.humidity} min={0} max={100} label="濕度" unit="%" color="#5b8fcc" />
                    </div>
                  </div>
                )}
              </div>
              {result.coolTemp && (
                <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 16px", borderRadius: 12, marginBottom: 12, background: "linear-gradient(135deg, #3a2e28, #5c4a3a)", color: "white" }}>
                  <div style={{ fontSize: 26 }}>❄️</div>
                  <div>
                    <div style={{ fontSize: 11, opacity: 0.6, letterSpacing: 1, marginBottom: 2 }}>建議冷氣設定</div>
                    <div style={{ fontSize: 32, fontWeight: 700, fontFamily: "'DM Mono', monospace", lineHeight: 1 }}>{result.coolTemp}°C</div>
                  </div>
                  <div style={{ marginLeft: "auto", fontSize: 11, opacity: 0.5, textAlign: "right", lineHeight: 1.8 }}>目標 THI<br/>&lt; 27.8</div>
                </div>
              )}
              {result.heatTemp && (
                <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 16px", borderRadius: 12, marginBottom: 12, background: "linear-gradient(135deg, #4a3a7c, #6a5aac)", color: "white" }}>
                  <div style={{ fontSize: 26 }}>🔆</div>
                  <div>
                    <div style={{ fontSize: 11, opacity: 0.6, letterSpacing: 1, marginBottom: 2 }}>建議暖氣設定</div>
                    <div style={{ fontSize: 32, fontWeight: 700, fontFamily: "'DM Mono', monospace", lineHeight: 1 }}>{result.heatTemp}°C</div>
                  </div>
                  <div style={{ marginLeft: "auto", fontSize: 11, opacity: 0.5, textAlign: "right", lineHeight: 1.8 }}>目標溫度<br/>15–25°C</div>
                </div>
              )}
              <div style={{ padding: "12px 14px", borderRadius: 10, background: "rgba(255,255,255,0.75)", borderLeft: `3px solid ${result.level.color}`, fontSize: 14, color: "#4a3f38", lineHeight: 1.8 }}>
                💡 {result.suggestion}
              </div>
              {hourlyData ? (
                <div style={{ marginTop: 4 }}>
                  <div style={{ fontSize: 12, color: "#999", marginBottom: 4, marginTop: 16 }}>📅 未來 24 小時建議時程</div>
                  <ScheduleCard schedule={result.schedule} />
                </div>
              ) : (
                <div style={{ marginTop: 12, padding: "10px 14px", borderRadius: 10,
                  background: "rgba(255,255,255,0.6)", border: "1px dashed #ddd",
                  fontSize: 12, color: "#bbb", textAlign: "center", lineHeight: 1.8 }}>
                  📅 想知道幾點要開冷暖氣？<br/>
                  請先按「自動抓取我的位置」再重新計算
                </div>
              )}
              <div style={{ marginTop: 14, fontSize: 11, color: "#ccc", lineHeight: 2 }}>
                THI 分級（Marai et al., 2002）：&lt;27.8 安全・27.8–28.9 輕微・28.9–30.0 嚴重・&gt;30.0 非常嚴重
              </div>
            </div>
          )}

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <div style={{ fontSize: 13, color: "#a89b8c", lineHeight: 2, marginBottom: 16, padding: "16px 20px",
              background: "white", borderRadius: 12, border: "1px solid #f0ece6" }}>
              本工具僅供參考測試使用。<br/>
              每隻兔兔的喜好和體質不同，<br/>請依自己兔兔平時的狀態和習慣調整。<br/><br/>
              🐇 祝福大家和兔兔，天長地久 🐇
            </div>
            <div style={{ fontSize: 12, color: "#ccc", lineHeight: 2.5 }}>
              <div>🐦 © 2025 資安小麻雀</div>
              <button onClick={() => setShowModal(true)} style={{
                background: "none", border: "none", color: "#c4a882", fontSize: 12,
                cursor: "pointer", textDecoration: "underline", padding: 0,
              }}>
                隱私權聲明・參考資料・免責聲明
              </button>
            </div>
          </div>

          {showModal && <InfoModal onClose={() => setShowModal(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
